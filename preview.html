<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grey — Web3 Product Designer</title>
    <script>
      window.greySkipHomeLoader =
        Boolean(location.hash) &&
        sessionStorage.getItem("grey-preview-page-transition") !== null;

      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }
      if (location.hash && !window.greySkipHomeLoader) {
        history.replaceState(null, "", location.pathname);
      }
      if (window.greySkipHomeLoader) {
        document.documentElement.classList.add("skip-home-loader");
      } else {
        document.documentElement.classList.add("loading-page");
        scrollTo(0, 0);
      }
    </script>
    <style>
      @font-face {
        font-family: "Aeonik";
        src: url("font/Aeonik-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Aeonik";
        src: url("font/Aeonik-Medium.ttf") format("truetype");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Aeonik";
        src: url("font/Aeonik-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Aeonik";
        src: url("font/Aeonik-Black.ttf") format("truetype");
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Clash Display";
        src: url("font/ClashDisplay-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Clash Display";
        src: url("font/ClashDisplay-Medium.otf") format("opentype");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Clash Display";
        src: url("font/ClashDisplay-Semibold.otf") format("opentype");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        --void: #050505;
        --coal: #0d0d0c;
        --graphite: #191715;
        --bone: #f1e9dc;
        --haze: #a79d90;
        --signal: #ff4d3d;
        --mint: #8ee6c8;
        --gold: #d6a84f;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--void);
        color: var(--bone);
        font-family: Aeonik, Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-rendering: geometricPrecision;
      }

      .loading-page,
      .loading-page body {
        overflow: hidden;
      }

      .skip-home-loader .preloader {
        display: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .noise {
        position: fixed;
        inset: 0;
        z-index: 50;
        pointer-events: none;
        opacity: 0.08;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 3px 3px;
        mix-blend-mode: overlay;
      }

      .preloader {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        background: #050505;
        color: #ffffff;
        animation: loaderExit 900ms cubic-bezier(0.76, 0, 0.24, 1) 1850ms forwards;
      }

      .preloader-inner {
        height: clamp(64px, 13vw, 210px);
        overflow: hidden;
        text-align: center;
      }

      .preloader-word {
        font-family: Aeonik, Inter, ui-sans-serif, system-ui, sans-serif;
        color: #ffffff;
        font-size: clamp(60px, 13vw, 210px);
        line-height: 1;
        letter-spacing: -0.045em;
        animation: wordIn 180ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .link {
        position: relative;
      }

      .link::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: -17px;
        left: 0;
        height: 2px;
        background: currentColor;
        opacity: 0.92;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .link:hover::after,
      .link:focus-visible::after {
        transform: scaleX(1);
        transform-origin: left;
      }

      .decrypt-brand {
        position: relative;
        display: inline-block;
        color: rgba(241, 233, 220, 0.82);
        font-variant-numeric: tabular-nums;
        text-align: left;
        white-space: pre;
      }

      .decrypt-measure {
        visibility: hidden;
        white-space: pre;
      }

      .decrypt-output {
        position: absolute;
        inset: 0;
        display: inline-block;
        white-space: pre;
      }

      .brand-link {
        display: inline-flex;
        justify-content: flex-start;
        width: fit-content;
      }

      .brand-link::after {
        right: auto;
        width: 100%;
      }

      .decrypt-brand .encrypted {
        color: var(--mint);
      }

      .loco-nav-link {
        font-size: clamp(15px, 1.04vw, 18px);
        font-weight: 500;
        line-height: 1;
        letter-spacing: 0;
        text-transform: none;
      }

      .hero {
        position: relative;
        isolation: isolate;
        min-height: 100svh;
        overflow: hidden;
        padding: 0 clamp(18px, 3vw, 44px);
      }

      .hero video {
        position: absolute;
        inset: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        filter: contrast(1.1) saturate(0.9);
        animation: heroVideoIn 1200ms cubic-bezier(0.22, 1, 0.36, 1) 1850ms forwards;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: linear-gradient(180deg, rgba(5, 5, 5, 0.72), rgba(5, 5, 5, 0.08) 34%, rgba(5, 5, 5, 0.42));
      }

      header {
        position: relative;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        height: 80px;
        color: rgba(241, 233, 220, 0.82);
        opacity: 0;
        transform: translateY(-18px);
        animation: headerIn 850ms cubic-bezier(0.22, 1, 0.36, 1) 1950ms forwards;
      }

      header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 100vw;
        height: 1px;
        background: rgba(241, 233, 220, 0.12);
        transform: translateX(-50%);
      }

      nav {
        display: flex;
        gap: clamp(18px, 3vw, 46px);
      }

      header > a:last-child {
        justify-self: end;
      }

      .hero-caption {
        position: absolute;
        bottom: clamp(24px, 3vw, 48px);
        left: clamp(18px, 3vw, 44px);
        margin: 0;
        color: #ffffff;
        font-family: "Clash Display", Aeonik, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(34px, 3.34vw, 64px);
        font-weight: 500;
        line-height: 1.02;
        white-space: nowrap;
        opacity: 0;
        transform: translateY(28px);
        animation: heroCaptionIn 900ms cubic-bezier(0.22, 1, 0.36, 1) 2100ms forwards;
      }

      .hero-caption span {
        display: block;
      }

      .hero-inner {
        display: grid;
        grid-template-rows: 1fr auto;
        min-height: calc(100svh - 80px);
        padding: clamp(52px, 8vw, 110px) 0 clamp(22px, 3vw, 44px);
      }

      .eyebrow {
        margin: 0 0 20px;
        color: var(--mint);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1,
      h2,
      h3,
      .metric-value {
        font-family: Aeonik, Inter, ui-sans-serif, system-ui, sans-serif;
        font-weight: 500;
        letter-spacing: -0.03em;
      }

      h1 {
        max-width: 1120px;
        font-size: clamp(58px, 13vw, 210px);
        line-height: 0.78;
      }

      .hero-bottom {
        display: grid;
        grid-template-columns: 0.88fr 1.12fr;
        align-items: end;
        gap: clamp(28px, 7vw, 120px);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .metric {
        border-top: 1px solid rgba(241, 233, 220, 0.16);
        padding-top: 16px;
      }

      .metric-value {
        font-size: clamp(28px, 4vw, 64px);
        line-height: 1;
      }

      .metric-label,
      .caption {
        margin-top: 8px;
        color: var(--haze);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .hero-copy {
        max-width: 650px;
        justify-self: end;
        color: rgba(241, 233, 220, 0.9);
        font-size: clamp(22px, 2.8vw, 46px);
        font-weight: 500;
        line-height: 1.02;
        text-wrap: balance;
      }

      main > section:not(.hero) {
        padding: clamp(86px, 12vw, 170px) clamp(18px, 3vw, 44px);
      }

      .figma-statement {
        display: grid;
        min-height: calc(100svh - 200px);
        place-items: center;
        background: #000000;
        padding: 0 clamp(18px, 3vw, 44px);
      }

      .figma-statement-text {
        width: 100%;
        max-width: 1460px;
        color: #ffffff;
        font-family: "Clash Display", Aeonik, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(32px, 4.45vw, 64px);
        font-weight: 400;
        line-height: 1.5;
        text-align: center;
        white-space: pre-wrap;
      }

      .statement-cursor {
        display: inline-block;
        margin-left: 0.25rem;
        animation: statementCursorBlink 1s ease-in-out infinite;
      }

      @keyframes statementCursorBlink {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0;
        }
      }

      main > section.recent-work {
        background: #000000;
        padding: 100px clamp(18px, 6.25vw, 120px)
          clamp(120px, 12.5vw, 240px);
      }

      .featured-work-grid {
        display: grid;
        width: 100%;
        max-width: 1680px;
        margin: 0 auto;
        gap: 40px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .featured-card {
        position: relative;
        overflow: hidden;
        background: #797979;
      }

      .featured-card-image {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 1067 / 1200;
        object-fit: cover;
        transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .featured-card-bg,
      .featured-card-logo {
        position: absolute;
        display: block;
        object-fit: cover;
        transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .featured-card-bg {
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .featured-card::after {
        content: none;
        position: absolute;
        inset: 0;
        background: linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.45),
          rgba(0, 0, 0, 0) 54%
        );
      }

      .featured-card-logo {
        top: 50%;
        left: 50%;
        z-index: 1;
        width: 160px;
        height: 160px;
        object-fit: contain;
        transform: translate(-50%, -50%);
      }

      .featured-card-copy {
        position: absolute;
        bottom: clamp(28px, 2.55vw, 49px);
        left: 50%;
        z-index: 1;
        width: min(485px, calc(100% - 48px));
        transform: translateX(-50%);
        color: #ffffff;
        font-family: "Clash Display", Aeonik, ui-sans-serif, system-ui, sans-serif;
        text-align: center;
      }

      .featured-card-copy h2 {
        font-family: "Clash Display", Aeonik, ui-sans-serif, system-ui, sans-serif;
        font-size: 24px;
        font-weight: 500;
        line-height: 1.5;
        letter-spacing: 0;
      }

      .featured-card-copy p {
        margin-top: 4px;
        color: rgba(255, 255, 255, 0.75);
        font-size: 16px;
        font-weight: 400;
        line-height: 1.5;
      }

      .featured-card:hover .featured-card-bg {
        transform: scale(1.04);
      }

      .featured-card:hover .featured-card-image {
        transform: scale(1.025);
      }

      .featured-card:hover .featured-card-logo {
        transform: translate(-50%, -50%) scale(1.1);
      }

      .recent-work-list-wrap {
        display: flex;
        width: 100%;
        max-width: 1680px;
        margin: clamp(48px, 5vw, 80px) auto 0;
        flex-direction: column;
        align-items: flex-start;
        gap: 48px;
      }

      .recent-work-label {
        display: block;
        width: 100%;
        max-width: 1680px;
        margin: 0 auto 48px;
        color: #9e9e9e;
        font-size: 24px;
        font-weight: 400;
        line-height: 1.5;
        text-transform: uppercase;
      }

      .recent-work-list {
        display: flex;
        width: 100%;
        flex-direction: column;
        align-items: center;
        gap: 40px;
      }

      .recent-line {
        width: 100%;
        height: 1px;
        background: rgba(255, 255, 255, 0.35);
      }

      .recent-item {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 40px;
        align-items: center;
        width: 100%;
        color: #ffffff;
        overflow: visible;
      }

      .recent-title {
        position: relative;
        z-index: 1;
        display: flex;
        width: 100%;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0 0.25em;
        color: #ffffff;
        font-family: "Clash Display", Aeonik, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(48px, 6.25vw, 120px);
        font-weight: 400;
        line-height: 1.5;
        text-align: center;
        text-transform: capitalize;
        transition:
          transform 500ms cubic-bezier(0.22, 1, 0.36, 1),
          color 500ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .recent-inline-image {
        display: inline-block;
        width: 0;
        height: 0;
        margin: 0;
        overflow: hidden;
        opacity: 0;
        vertical-align: middle;
        transition:
          width 500ms cubic-bezier(0.22, 1, 0.36, 1),
          height 500ms cubic-bezier(0.22, 1, 0.36, 1),
          margin 500ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 500ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .recent-inline-image img {
        width: 190px;
        height: 120px;
        object-fit: cover;
        transform: scale(1.08);
        transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .recent-title .encrypted {
        color: rgba(255, 255, 255, 0.45);
      }

      .recent-item:hover .recent-title {
        transform: translateY(-8px);
      }

      .recent-item:hover .recent-inline-image {
        width: 190px;
        height: 120px;
        margin: 0 16px;
        opacity: 1;
      }

      .recent-item:hover .recent-inline-image img {
        transform: scale(1);
      }

      .recent-item:hover .recent-line {
        background: rgba(255, 255, 255, 0.8);
      }

      .site-footer {
        background: #000000;
      }

      .footer-contact-band {
        display: flex;
        height: clamp(320px, 21.875vw, 420px);
        flex-direction: column;
        align-items: center;
        background: #eafd27;
        padding: clamp(82px, 6.15vw, 118px) clamp(18px, 6.25vw, 120px) 0;
        color: #000000;
      }

      .footer-title {
        width: 100%;
        max-width: 997px;
        color: #000000;
        font-family: "Clash Display", Aeonik, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(52px, 5.21vw, 100px);
        font-weight: 400;
        line-height: 1.5;
        letter-spacing: 0;
        text-align: center;
        text-transform: capitalize;
        animation: footerFadeUp 750ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .footer-title strong {
        font-weight: 600;
      }

      .footer-links {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 64px;
        margin-top: 20px;
        color: #000000;
        font-family: "Clash Display", Aeonik, ui-sans-serif, system-ui, sans-serif;
        font-size: 24px;
        font-weight: 400;
        line-height: 1.5;
        animation: footerFadeUp 700ms cubic-bezier(0.22, 1, 0.36, 1) 80ms both;
      }

      .footer-links a {
        display: flex;
        align-items: center;
        gap: 16px;
        white-space: nowrap;
      }

      .footer-links img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      @keyframes footerFadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 32px;
        margin-bottom: 48px;
        border-top: 1px solid rgba(241, 233, 220, 0.14);
        padding-top: 20px;
      }

      h2 {
        font-size: clamp(44px, 8vw, 128px);
        line-height: 0.88;
      }

      .section-head p {
        max-width: 430px;
        color: var(--haze);
        font-size: 18px;
        line-height: 1.35;
      }

      .projects {
        display: grid;
        gap: 20px;
      }

      .project {
        display: grid;
        grid-template-columns: 0.86fr 1.14fr;
        min-height: 520px;
        overflow: hidden;
        border: 1px solid rgba(241, 233, 220, 0.14);
        background: rgba(25, 23, 21, 0.72);
      }

      .project-content {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: clamp(22px, 3vw, 42px);
      }

      .project-meta {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        color: var(--haze);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h3 {
        font-size: clamp(42px, 7vw, 106px);
        line-height: 0.86;
      }

      .project-summary {
        max-width: 620px;
        margin-top: 28px;
        color: rgba(241, 233, 220, 0.82);
        font-size: clamp(18px, 2vw, 28px);
        line-height: 1.12;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 40px;
      }

      .tag {
        border: 1px solid rgba(241, 233, 220, 0.16);
        padding: 8px 12px;
        color: rgba(241, 233, 220, 0.78);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .visual {
        position: relative;
        min-height: 420px;
        overflow: hidden;
        border-left: 1px solid rgba(241, 233, 220, 0.14);
        background:
          linear-gradient(135deg, rgba(255, 77, 61, 0.22), transparent 30%),
          linear-gradient(315deg, rgba(142, 230, 200, 0.18), transparent 32%),
          #050505;
      }

      .mock {
        position: absolute;
        inset: clamp(22px, 4vw, 64px);
        display: grid;
        grid-template-rows: auto 1fr auto;
        border: 1px solid rgba(241, 233, 220, 0.16);
        background: rgba(0, 0, 0, 0.42);
        padding: clamp(18px, 2.5vw, 34px);
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
      }

      .mock-top,
      .mock-bottom {
        display: flex;
        justify-content: space-between;
        border-color: rgba(241, 233, 220, 0.12);
        color: var(--haze);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .mock-top {
        border-bottom: 1px solid rgba(241, 233, 220, 0.12);
        padding-bottom: 16px;
      }

      .mock-bottom {
        border-top: 1px solid rgba(241, 233, 220, 0.12);
        padding-top: 16px;
      }

      .mock-body {
        display: grid;
        place-items: center;
      }

      .wire {
        width: min(100%, 520px);
      }

      .line {
        height: 12px;
        margin-bottom: 20px;
        background: rgba(241, 233, 220, 0.14);
      }

      .line.short {
        width: 50%;
      }

      .line.long {
        width: 74%;
        opacity: 0.7;
      }

      .tiles {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .tile {
        height: 112px;
        border: 1px solid rgba(241, 233, 220, 0.1);
        background: rgba(241, 233, 220, 0.07);
      }

      .chart {
        height: 128px;
        margin-top: 16px;
        border: 1px solid rgba(241, 233, 220, 0.1);
        background: linear-gradient(90deg, rgba(255, 77, 61, 0.26), rgba(142, 230, 200, 0.18), rgba(214, 168, 79, 0.22));
      }

      .reveal {
        animation: fadeUp 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes loaderExit {
        to {
          transform: translateY(-100%);
        }
      }

      @keyframes wordIn {
        from {
          opacity: 0;
          transform: translateY(100%);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes heroVideoIn {
        from {
          opacity: 0;
          transform: scale(1.08);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes headerIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes heroCaptionIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeUp {

    <script>
      const words = [
        "Hello",
        "Bonjour",
        "स्वागत हे",
        "Ciao",
        "Olá",
        "おい",
        "Hallå",
        "Guten tag",
        "Hallo",
      ];
      const wordEl = document.getElementById("preloader-word");
      let wordIndex = 0;

      if (window.greySkipHomeLoader) {
        document.documentElement.classList.remove("loading-page");
        const scrollToHashTarget = () => {
          const target = location.hash ? document.querySelector(location.hash) : null;
          target?.scrollIntoView({ block: "start" });
        };

        requestAnimationFrame(scrollToHashTarget);
        window.setTimeout(scrollToHashTarget, 1050);
      } else {
        window.scrollTo(0, 0);

        const timer = window.setInterval(() => {
          wordIndex = (wordIndex + 1) % words.length;
          wordEl.textContent = words[wordIndex];
          wordEl.style.animation = "none";
          void wordEl.offsetWidth;
          wordEl.style.animation = "";
        }, 180);

        window.setTimeout(() => {
          window.clearInterval(timer);
        }, 1850);

        window.setTimeout(() => {
          window.scrollTo(0, 0);
          document.documentElement.classList.remove("loading-page");
        }, 2750);
      }

      const brand = document.getElementById("brand-decrypt");
      const brandText = "@GREY DESIGN PORTFOLIO";
      const brandChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@/#$%&";
      let brandTimer = null;

      function renderBrand(text, encrypted = false) {
        brand.innerHTML = `<span class="decrypt-measure">${brandText}</span><span class="decrypt-output">${text
          .split("")
          .map((char) => {
            return `<span class="${encrypted ? "encrypted" : ""}">${char === " " ? "&nbsp;" : char}</span>`;
          })
          .join("")}</span>`;
      }

      renderBrand(brandText);

      function randomBrandText() {
        return brandText
          .split("")
          .map((char) => {
            if (char === " ") return " ";
            return brandChars[Math.floor(Math.random() * brandChars.length)];
          })
          .join("");
      }

      brand.addEventListener("mouseenter", () => {
        window.clearInterval(brandTimer);
        let iteration = 0;
        brandTimer = window.setInterval(() => {
          iteration += 1;
          if (iteration >= 12) {
            window.clearInterval(brandTimer);
            renderBrand(brandText);
            return;
          }
          renderBrand(randomBrandText(), true);
        }, 34);
      });

      brand.addEventListener("mouseleave", () => {
        window.clearInterval(brandTimer);
        renderBrand(brandText);
      });

      const statementType = document.getElementById("statement-type");
      const statementText =
        "Design is the balance between clarity, emotion, and technology.\nI create experiences that feel minimal, intentional, and timeless.";
      let statementStarted = false;

      function typeStatement() {
        if (statementStarted || !statementType) return;
        statementStarted = true;
        let index = 0;

        const step = () => {
          statementType.textContent = statementText.slice(0, index);
          index += 1;
          if (index <= statementText.length) {
            const delay = 16 + Math.random() * 26;
            window.setTimeout(step, delay);
          }
        };

        window.setTimeout(step, 180);
      }

      const statementSection = document.querySelector(".figma-statement");
      if (statementSection && "IntersectionObserver" in window) {
        const statementObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                typeStatement();
                statementObserver.disconnect();
              }
            });
          },
          { threshold: 0.1 }
        );
        statementObserver.observe(statementSection);
      } else {
        typeStatement();
      }

      const recentCharacters =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

      document.querySelectorAll(".recent-item").forEach((item) => {
        const wordEls = Array.from(
          item.querySelectorAll(".recent-title > span:not(.recent-inline-image)")
        );
        const timers = new Map();

        wordEls.forEach((wordEl) => {
          wordEl.dataset.text = wordEl.textContent;
        });

        const randomText = (text) =>
          text
            .split("")
            .map((char) => {
              if (char === " ") return " ";
              return recentCharacters[
                Math.floor(Math.random() * recentCharacters.length)
              ];
            })
            .join("");

        item.addEventListener("mouseenter", () => {
          wordEls.forEach((wordEl) => {
            const original = wordEl.dataset.text;
            let iteration = 0;
            window.clearInterval(timers.get(wordEl));

            const timer = window.setInterval(() => {
              iteration += 1;
              if (iteration >= 9) {
                window.clearInterval(timer);
                wordEl.textContent = original;
                wordEl.classList.remove("encrypted");
                return;
              }

              wordEl.textContent = randomText(original);
              wordEl.classList.add("encrypted");
            }, 28);

            timers.set(wordEl, timer);
          });
        });

        item.addEventListener("mouseleave", () => {
          wordEls.forEach((wordEl) => {
            window.clearInterval(timers.get(wordEl));
            wordEl.textContent = wordEl.dataset.text;
            wordEl.classList.remove("encrypted");
          });
        });
      });

    </script>
