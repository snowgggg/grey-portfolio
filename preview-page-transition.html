<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grey Portfolio - Page Transition Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --ease: cubic-bezier(0.76, 0, 0.24, 1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        overflow: hidden;
        background: #050505;
        color: #f1e9dc;
        font-family:
          Aeonik, Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        min-height: 100svh;
        padding: clamp(18px, 3vw, 44px);
        background:
          linear-gradient(rgba(5, 5, 5, 0.2), rgba(5, 5, 5, 0.9)),
          url("public/assets/recent-work/gatepay image 1.png") center / cover;
        transition: opacity 0.2s ease;
      }

      .page.is-hidden {
        opacity: 0;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 80px;
        border-bottom: 1px solid rgba(241, 233, 220, 0.12);
        color: rgba(241, 233, 220, 0.82);
        font-size: clamp(15px, 1.04vw, 18px);
        font-weight: 500;
      }

      main {
        display: grid;
        min-height: calc(100svh - 80px);
        align-items: end;
        padding-bottom: clamp(40px, 7vw, 112px);
      }

      p {
        max-width: 980px;
        margin: 0;
        color: white;
        font-family:
          "Clash Display", Aeonik, Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(48px, 8vw, 132px);
        font-weight: 400;
        line-height: 1.05;
      }

      button {
        width: max-content;
        margin-top: 32px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 999px;
        padding: 14px 22px;
        background: transparent;
        color: white;
        cursor: pointer;
        font: inherit;
      }

      .destination {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: #0a0a0a;
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .destination.is-visible {
        opacity: 1;
      }

      .transition {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        background: #050505;
        transform: translateY(100%);
        will-change: transform;
      }

      .transition-title {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding-inline: 24px;
        color: rgba(255, 255, 255, 0.9);
        font-family:
          "Clash Display", Aeonik, Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 40px;
        font-weight: 400;
        letter-spacing: 0.22em;
        line-height: 1;
        opacity: 0;
        text-align: center;
        transform: translateY(18px);
        transition:
          opacity 0.28s var(--ease),
          transform 0.28s var(--ease);
      }

      .transition-index {
        display: block;
        width: 10px;
        height: 10px;
        background: rgba(255, 255, 255, 0.75);
        border-radius: 999px;
      }

      .transition.is-entering {
        transform: translateY(0);
        transition: transform 0.82s var(--ease);
      }

      .transition.has-title .transition-title {
        opacity: 1;
        transform: translateY(0);
      }

      .transition.is-leaving {
        transform: translateY(-102%);
        transition: transform 0.9s var(--ease);
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          transition-duration: 1ms !important;
        }
      }

      @media (max-width: 640px) {
        .transition-title {
          font-size: 32px;
        }
      }
    </style>
    <script src="preview-transition-boot.js"></script>
</head>
  <body>
    <section class="page" aria-label="Current page preview">
      <header>
        <span>@GREY DESIGN PORTFOLIO</span>
        <span>Work</span>
      </header>
      <main>
        <div>
          <p>Gate Pay Website transition test.</p>
          <button type="button">Replay transition</button>
        </div>
      </main>
    </section>

    <section class="destination" aria-label="Destination page preview"></section>

    <div class="transition" aria-hidden="true">
      <div class="transition-title">
        <span class="transition-index"></span>
        <span>GATEPAY</span>
      </div>
    </div>

    <script>
      const button = document.querySelector("button");
      const page = document.querySelector(".page");
      const transition = document.querySelector(".transition");
      const destination = document.querySelector(".destination");

      function reset() {
        page.className = "page";
        transition.className = "transition";
        destination.className = "destination";
      }

      function playTransition() {
        reset();
        requestAnimationFrame(() => {
          transition.classList.add("is-entering");
        });

        window.setTimeout(() => {
          transition.classList.add("has-title");
        }, 820);

        window.setTimeout(() => {
          page.classList.add("is-hidden");
          destination.classList.add("is-visible");
          transition.classList.add("is-leaving");
        }, 1180);

        window.setTimeout(reset, 2150);
      }

      button.addEventListener("click", playTransition);
      window.setTimeout(playTransition, 450);
    </script>
    <script src="preview-transition.js"></script>
  <script src="preview-experience.js"></script>
  <script src="preview-music-player.js"></script>
  </body>
</html>
